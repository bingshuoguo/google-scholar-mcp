name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: GOLANG_PROTOBUF_REGISTRATION_CONFLICT=warn go test ./...

      - name: Run stdio smoke test
        run: ./scripts/verify_stdio.sh smoke
